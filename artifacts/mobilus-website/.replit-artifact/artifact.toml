kind = "web"
previewPath = "/"
title = "Mobilus Website"
version = "1.0.0"
id = "artifacts/mobilus-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25385

[services.development]
run = "pnpm --filter @workspace/mobilus-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobilus-website", "run", "build" ]
publicDir = "artifacts/mobilus-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25385"
BASE_PATH = "/"
